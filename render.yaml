services:
  - type: web
    name: personal-productivity-app
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeployTrigger: commit
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: personal-productivity-db
          property: connectionString

databases:
  - name: personal-productivity-db
    plan: free
